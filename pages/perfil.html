<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#39E079",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 py-4 flex items-center justify-between">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Mi Perfil</h1>
<div class="size-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 overflow-y-auto pb-32">
<!-- Profile Photo Section -->
<section class="flex flex-col items-center py-8">
<div class="relative group">
<div class="size-32 rounded-full border-4 border-primary/20 p-1 overflow-hidden bg-background-light dark:bg-background-dark">
<img alt="Profile picture" class="w-full h-full object-cover rounded-full" data-alt="Close up portrait of a smiling male delivery collector" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-FIwz5nD2II8samNTDzqtBp1HndIbXGmyetVFiEh-bJA4xgRZ8pkWvAiI4YknU_ubQnon2r4VSVYVYJdMdQbjD6eA7N3Ln9WRRS9Mvb-jAu58EaZ-yVuhMtm6-fQyQ_JKBiK9wOuEuaasYyQnL8Zn0zq5EnXPDZeWEr44toKMspZrAuPO4wFqUOj1Xbsm4yo6ww88v9hv32Hsef-DEPQeePUbPnBoHUFZdz0usatrQspv6OR1thQwSnKVjS8GpDtmLqotnFnbkgM"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-background-dark size-10 rounded-full flex items-center justify-center border-4 border-background-light dark:border-background-dark shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">photo_camera</span>
</button>
</div>
<div class="mt-4 text-center">
<h2 class="text-xl font-bold">Carlos Rodríguez</h2>
<p class="text-primary font-medium text-sm">Recolector Verificado</p>
</div>
</section>
<!-- Information Sections -->
<div class="px-4 space-y-6">
<!-- Personal Info -->
<div class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-[20px]">person</span>
<h3 class="font-bold text-sm uppercase tracking-wider text-slate-500 dark:text-slate-400">Información Personal</h3>
</div>
<div class="space-y-3">
<div class="group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Nombre Completo</label>
<input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" value="Carlos Rodríguez"/>
</div>
<div class="group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Correo Electrónico</label>
<input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="email" value="carlos.rod@laundryapp.com"/>
</div>
<div class="group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Teléfono / WhatsApp</label>
<input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="tel" value="+54 11 1234-5678"/>
</div>
</div>
</div>
<!-- Security Section -->
<div class="space-y-4 pt-4 border-t border-primary/10">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-[20px]">lock</span>
<h3 class="font-bold text-sm uppercase tracking-wider text-slate-500 dark:text-slate-400">Seguridad</h3>
</div>
<div class="space-y-3">
<div class="group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Contraseña Actual</label>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Nueva Contraseña</label>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Min. 8 caracteres" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
</div>
<!-- Guardar Changes Button -->
<div class="pt-6">
<button class="w-full bg-primary text-background-dark font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    Guardar Cambios
                </button>
<button class="w-full mt-4 text-rose-500 font-semibold py-3 flex items-center justify-center gap-2">
                    Cerrar Sesión
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-primary/10 px-6 py-3 flex items-center justify-between z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-medium">Explorar</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">map</span>
<span class="text-[10px] font-medium">Mi Ruta</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px] font-medium">Dashboard</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary active-nav" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Perfil</span>
</a>
</nav>
</body></html>
