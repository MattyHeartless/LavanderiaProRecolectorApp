<div class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">
  <header class="sticky top-0 z-20 bg-background-light/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-primary/10 rounded-lg">
          <span class="material-symbols-outlined text-primary">person</span>
        </div>
        <h1 class="text-xl font-bold tracking-tight">Mi Perfil</h1>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto pb-32">
    <section class="flex flex-col items-center py-8">
      <div class="relative group">
        <div class="size-32 rounded-full border-4 border-primary/20 p-1 overflow-hidden bg-background-light dark:bg-background-dark">
          <img
            alt="Profile picture"
            class="w-full h-full object-cover rounded-full"
            [src]="profileImageUrl()"
          />
        </div>
        <input #profileImageInput class="hidden" type="file" accept="image/png,image/jpeg,image/webp" (change)="onProfileImageSelected($event)" />
        <button class="absolute bottom-0 right-0 bg-primary text-background-dark size-10 rounded-full flex items-center justify-center border-4 border-background-light dark:border-background-dark shadow-lg active:scale-95 transition-transform disabled:opacity-60 disabled:cursor-not-allowed" type="button" [disabled]="isUploadingProfileImage()" (click)="profileImageInput.click()">
          <span class="material-symbols-outlined text-[20px]">{{ isUploadingProfileImage() ? 'hourglass_top' : 'photo_camera' }}</span>
        </button>
      </div>
      @if (profileImageError()) {
        <p class="mt-3 text-xs font-medium text-red-500">{{ profileImageError() }}</p>
      }
      <div class="mt-4 text-center">
        <h2 class="text-xl font-bold">{{ fullName() }}</h2>
        <p class="text-primary font-medium text-sm">Recolector Verificado</p>
      </div>
    </section>

    <div class="px-4 space-y-6">
      <div class="space-y-4">
        <div class="flex items-center gap-2 px-1">
          <span class="material-symbols-outlined text-primary text-[20px]">person</span>
          <h3 class="font-bold text-sm uppercase tracking-wider text-slate-500 dark:text-slate-400">Información Personal</h3>
        </div>
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Nombre Completo</label>
            <input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" [value]="fullName()" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Correo Electrónico</label>
            <input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="email" [value]="email()" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Teléfono / WhatsApp</label>
            <input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="tel" [value]="phoneNumber()" />
          </div>
        </div>
      </div>

      <div class="space-y-4 pt-4 border-t border-primary/10">
        <div class="flex items-center gap-2 px-1">
          <span class="material-symbols-outlined text-primary text-[20px]">lock</span>
          <h3 class="font-bold text-sm uppercase tracking-wider text-slate-500 dark:text-slate-400">Seguridad</h3>
        </div>
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Contraseña Actual</label>
            <div class="relative">
              <input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="••••••••" [type]="showCurrentPassword ? 'text' : 'password'" />
              <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" type="button" (click)="toggleCurrentPasswordVisibility()">
                <span class="material-symbols-outlined">{{ showCurrentPassword ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 ml-1">Nueva Contraseña</label>
            <div class="relative">
              <input class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Min. 8 caracteres" [type]="showNewPassword ? 'text' : 'password'" />
              <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" type="button" (click)="toggleNewPasswordVisibility()">
                <span class="material-symbols-outlined">{{ showNewPassword ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="pt-6">
        <button class="w-full bg-primary text-background-dark font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
          <span class="material-symbols-outlined">save</span>
          Guardar Cambios
        </button>
        <button class="w-full mt-4 text-rose-500 font-semibold py-3 flex items-center justify-center gap-2" type="button" (click)="openLogoutModal()">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </main>

  @if (showLogoutModal) {
    <div class="fixed inset-0 z-[70] bg-black/45 flex items-end justify-center px-4 pb-28" (click)="cancelLogout()">
      <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-700 p-5 shadow-2xl" (click)="$event.stopPropagation()">
        <h3 class="text-base font-bold text-slate-900 dark:text-slate-100">¿Estás seguro en cerrar sesión?</h3>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Se cerrará tu sesión actual y regresarás al inicio de sesión.</p>
        <div class="mt-5 grid grid-cols-2 gap-3">
          <button class="h-11 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-semibold" type="button" (click)="cancelLogout()">
            Cancelar
          </button>
          <button class="h-11 rounded-lg bg-rose-500 text-white font-semibold" type="button" (click)="confirmLogout()">
            Sí, cerrar sesión
          </button>
        </div>
      </div>
    </div>
  }
</div>
